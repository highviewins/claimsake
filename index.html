<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Website Under Construction</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f6f8;
      color: #222;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box {
      background: white;
      padding: 50px 35px;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      max-width: 520px;
      width: 90%;
    }

    h1 {
      margin: 0 0 15px;
      font-size: 36px;
    }

    p {
      font-size: 18px;
      color: #555;
      margin: 0;
      line-height: 1.5;
    }

    .icon {
      font-size: 54px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="icon">🚧</div>
    <h1>Website Under Construction</h1>
    <p><br>
    </p>
  </div>
</body>
</html>
